name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths: ['backend/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build TypeScript
        working-directory: ./backend
        run: npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/emsc-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/emsc-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/emsc-backend:buildcache,mode=max

      - name: Deploy to Railway
        uses: railway/actions@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          project: emsc-backend
          environment: production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
